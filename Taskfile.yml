# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  build:
    desc: Build the project
    cmds:
      - uv build
    silent: true
  run:
    desc: Run the project
    cmds:
      - uv run stellarbridge-mcp

  test-integration:
    desc: Spawn real MCP over stdio + mock API (deterministic integration tests)
    env:
      STELLARBRIDGE_API_KEY: integration-test-api-key
      STELLARBRIDGE_API_URL: http://127.0.0.1:9
    cmds:
      - uv run pytest tests/integration -v

  test-integration-live:
    desc: MCP integration against real API (set STELLARBRIDGE_LIVE_API=1, STELLARBRIDGE_API_URL, STELLARBRIDGE_API_KEY)
    cmds:
      - uv run pytest tests/integration_live -v

  live-first-transfer-id:
    desc: Print first transfer tid via stdio MCP (for STELLARBRIDGE_TEST_TRANSFER_ID); same path as live tests
    cmds:
      - PYTHONPATH=. uv run python tests/integration_live/print_first_transfer_id.py

  inspector:
    desc: Run the MCP server with the MCP Inspector (dev UI); uses two free ports on 127.0.0.1 (see printed URL)
    cmds:
      - |
        set -euo pipefail
        pick_port() { python3 -c "import socket; s=socket.socket(); s.bind(('127.0.0.1',0)); print(s.getsockname()[1]); s.close()"; }
        UI="$(pick_port)"
        PROXY="$(pick_port)"
        while [ "$UI" = "$PROXY" ]; do PROXY="$(pick_port)"; done
        # Inspector rejects browser requests unless the UI origin is in this list (DNS rebinding protection).
        export ALLOWED_ORIGINS="http://127.0.0.1:${UI},http://localhost:${UI}"
        export CLIENT_PORT="$UI" SERVER_PORT="$PROXY" HOST=127.0.0.1 NPM_CONFIG_YES=true
        uv run fastmcp dev inspector stellarbridge_mcp.server --with-editable . -m \
          --ui-port "$UI" --server-port "$PROXY" --inspector-version 0.21.1

  inspector:kill:
    desc: Best-effort stop of MCP Inspector npx processes (may fail if sandboxed)
    cmds:
      - pkill -f '@modelcontextprotocol/inspector' || true
